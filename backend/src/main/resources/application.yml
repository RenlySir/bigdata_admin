spring:
  application:
    name: bigdata-admin

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${TIDB_HOST:localhost}:${TIDB_PORT:4000}/bigdata_admin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${TIDB_USERNAME:root}
    password: ${TIDB_PASSWORD:}

    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080
  servlet:
    context-path: /api

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.bigdata.admin.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

logging:
  level:
    com.bigdata.admin: DEBUG
    org.springframework.web: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

app:
  jwt:
    # IMPORTANT: Set JWT_SECRET environment variable in production!
    # Generate a secure key: openssl rand -base64 32
    # Default is for development only - will fail validation in production
    secret: ${JWT_SECRET:}
    expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
    issuer: bigdata-admin
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}
  ratelimit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    capacity: ${RATE_LIMIT_CAPACITY:100}
    time-window-seconds: ${RATE_LIMIT_WINDOW:60}
    batch-capacity: ${RATE_LIMIT_BATCH_CAPACITY:10}
    sensitive-capacity: ${RATE_LIMIT_SENSITIVE_CAPACITY:5}
    use-redis: ${RATE_LIMIT_USE_REDIS:true}
