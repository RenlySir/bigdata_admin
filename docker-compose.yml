version: '3.8'

services:
  tidb:
    image: pingcap/tidb:latest
    ports:
      - "4000:4000"
      - "10080:10080"
    environment:
      TIDB_STORAGE_ENGINE: tikv
    command: >
      --store=tikv
      --path=tidb://tikv:20160
      --advertise-address="tidb"
      --port=4000
      --status=10080
    networks:
      - bigdata-net

  tikv:
    image: pingcap/tikv:latest
    volumes:
      - tikv-data:/data
    command: >
      --addr=tikv:20160
      --advertise-addr=tikv:20160
      --data-dir=/data
    networks:
      - bigdata-net

  pd:
    image: pingcap/pd:latest
    volumes:
      - pd-data:/data
    command: >
      --name=pd
      --data-dir=/data
      --client-urls=http://0.0.0.0:2379
      --peer-urls=http://0.0.0.0:2380
      --advertise-client-urls=http://pd:2379
      --advertise-peer-urls=http://pd:2380
      --initial-cluster=pd=http://pd:2380
    networks:
      - bigdata-net

networks:
  bigdata-net:
    driver: bridge

volumes:
  tikv-data:
  pd-data:
